name: Blue-Green Docker Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code (only needed if future CI build is added)
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Deploy to server via SSH
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}

          script: |
            set -e

            cd /home/talhaVM/Aegix-Ai

            # Ensure latest code is clean
            git fetch origin
            git reset --hard origin/master

            # Detect active container
            if docker ps --format '{{.Names}}' | grep -q app_blue; then
                ACTIVE=blue
                NEW=green
                NEW_PORT=8082
                OLD_PORT=8081
            else
                ACTIVE=green
                NEW=blue
                NEW_PORT=8081
                OLD_PORT=8082
            fi

            echo "Active: $ACTIVE | Deploying: $NEW"

            # Remove old NEW container if exists
            docker stop app_$NEW || true
            docker rm app_$NEW || true

            # Build new image
            docker build -t aegix-ai:$NEW .

            # Start NEW container on separate port
            docker run -d \
              --name app_$NEW \
              -p $NEW_PORT:8080 \
              aegix-ai:$NEW

            # Health check (important improvement)
            echo "Waiting for health check..."
            for i in {1..10}; do
              if curl -f http://localhost:$NEW_PORT/health; then
                echo "Health check passed"
                break
              fi
              sleep 3
            done

            # Stop OLD container after success
            docker stop app_$ACTIVE || true
            docker rm app_$ACTIVE || true

            echo "Deployment completed successfully (Blue-Green switch done)"